name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev pkg-config \
            libwayland-dev libxkbcommon-dev \
            libssl-dev \
            libpam0g-dev

      - name: Install Rust (from rust-toolchain.toml)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup show
          rustc --version

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install cargo-deb and cargo-generate-rpm
        run: cargo binstall -y cargo-deb cargo-generate-rpm

      - name: Build release binaries
        run: cargo build --release

      - name: Package crates
        run: |
          cargo deb --no-build -p idle-daemon
          cargo deb --no-build -p idle-cli
          cargo generate-rpm -p idle-daemon
          cargo generate-rpm -p idle-cli

      - name: Install Cosign
        run: |
          curl -Lo cosign https://github.com/sigstore/cosign/releases/download/v2.2.4/cosign-linux-amd64
          chmod +x cosign
          sudo mv cosign /usr/local/bin/

      - name: Sign packages with Cosign
        run: |
          for file in target/debian/*.deb target/generate-rpm/*.rpm; do
            cosign sign-blob --yes --output-signature "${file}.sig" --output-certificate "${file}.pem" "$file"
          done

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            target/debian/*.deb \
            target/debian/*.sig \
            target/debian/*.pem \
            target/generate-rpm/*.rpm \
            target/generate-rpm/*.sig \
            target/generate-rpm/*.pem

      - name: Trigger Packages Repository Update
        env:
          DISPATCH_TOKEN: ${{ secrets.IDLESCREEN_PACKAGES_DISPATCH_TOKEN }}
        if: env.DISPATCH_TOKEN != ''
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/idlescreen/packages/dispatches \
            -d "{\"event_type\": \"new_release\", \"client_payload\": {\"repo\": \"${{ github.repository }}\", \"tag\": \"${{ github.ref_name }}\"}}"
